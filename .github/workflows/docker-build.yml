name : Build ComCache

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      release:
        description: 'Set true for release build, false for snapshot'
        required: true
        default: 'false'


jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2

        - name: Read Version
          id: get_version
          run: |
            VERSION=$(cat VERSION)
            echo "VERSION=$VERSION" >> $GITHUB_ENV

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v4
          with:
            context: .
            push: true
            tags: |
              "${{ secrets.DOCKER_USERNAME }}/comcache:latest"
              "${{ secrets.DOCKER_USERNAME }}/comcache:${{ env.VERSION }}"

        - name: Run trivy security scan
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: ${{ secrets.DOCKER_USERNAME }}/comcache:latest
            format: 'table'
            severity: 'CRITICAL'
            ignore-unfixed: true
